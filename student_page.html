<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f0f8ff;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            width:350px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#007BFF;
        }

        label{
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:10px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .links{
            margin-top:15px;
            text-align:center;
        }

        .links a{
            text-decoration:none;
            color:#007BFF;
        }

        .links a:hover{
            text-decoration:underline;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>Student Login</h2>

    <form action="#" method="post">

        <label>Student ID</label>
        <input type="text" placeholder="Enter Student ID" required>

        <label>Password</label>
        <input type="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>

        <div class="links">
            <br>
            <a href="#">Forgot Password?</a>
            <br><br>
            <a href="#">Create New Account</a>
        </div>

    </form>

</div>

</body>
</html>
