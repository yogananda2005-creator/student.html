<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
            padding:30px;
        }

        .container{
            max-width:900px;
            margin:auto;
            background:#fff;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#0d6efd;
            margin-bottom:20px;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            font-weight:bold;
        }

        input, select{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        table, th, td{
            border:1px solid #ccc;
        }

        th{
            background:#0d6efd;
            color:white;
            padding:10px;
        }

        td{
            padding:10px;
            text-align:center;
        }

        .buttons{
            text-align:center;
            margin-top:20px;
        }

        button{
            padding:10px 25px;
            margin:5px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        .submit{
            background:#198754;
            color:white;
        }

        .reset{
            background:#dc3545;
            color:white;
        }

        button:hover{
            opacity:0.9;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Student Attendance System</h1>

    <div class="form-group">
        <label>Student Name</label>
        <input type="text" placeholder="Enter Student Name">
    </div>

    <div class="form-group">
        <label>Student ID</label>
        <input type="text" placeholder="Enter Student ID">
    </div>

    <div class="form-group">
        <label>Date</label>
        <input type="date">
    </div>

    <div class="form-group">
        <label>Subject</label>
        <select>
            <option>Select Subject</option>
            <option>Python</option>
            <option>SQL</option>
            <option>MongoDB</option>
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
        </select>
    </div>

    <table>
        <tr>
            <th>Roll No</th>
            <th>Student Name</th>
            <th>Present</th>
            <th>Absent</th>
        </tr>

        <tr>
            <td>101</td>
            <td>Rahul</td>
            <td><input type="radio" name="s1"></td>
            <td><input type="radio" name="s1"></td>
        </tr>

        <tr>
            <td>102</td>
            <td>Ravi</td>
            <td><input type="radio" name="s2"></td>
            <td><input type="radio" name="s2"></td>
        </tr>

        <tr>
            <td>103</td>
            <td>Priya</td>
            <td><input type="radio" name="s3"></td>
            <td><input type="radio" name="s3"></td>
        </tr>

        <tr>
            <td>104</td>
            <td>Anjali</td>
            <td><input type="radio" name="s4"></td>
            <td><input type="radio" name="s4"></td>
        </tr>

    </table>

    <div class="buttons">
        <button class="submit">Submit Attendance</button>
        <button class="reset" type="reset">Reset</button>
    </div>

</div>

</body>
</html>
